<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #1a1625;
  --ink2: #3d3559;
  --ink3: #7b72a8;
  --fog: #f5f3ff;
  --fog2: #ede9ff;
  --white: #ffffff;
  --border: rgba(91,82,200,0.12);
  --border2: rgba(91,82,200,0.22);
  --purple: #5B52C8;
  --purple-light: #8B7FE8;
  --purple-dim: rgba(91,82,200,0.08);
  --green: #1A7A4A;
  --orange: #C17D25;
  --blue: #1565C0;
  --violet: #6A1B9A;
  --red: #B83535;
  --teal: #0277BD;
  --coral: #C45A10;
  --dark-purple: #4A148C;
  --font: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', system-ui, -apple-system, sans-serif;
  --mono: 'SF Mono', 'Cascadia Code', 'Consolas', 'Courier New', monospace;
  --r: 10px;
  --r2: 16px;
}

body {
  font-family: var(--font);
  background: var(--white);
  color: var(--ink);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
.header {
  background: var(--ink);
  color: var(--white);
  padding: 0;
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  align-items: stretch;
  gap: 0;
  height: 64px;
}
.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  padding-right: 28px;
  border-right: 1px solid rgba(255,255,255,0.1);
  text-decoration: none;
}
.brand-mark {
  width: 36px; height: 36px;
  background: var(--purple);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 14px; color: #fff; letter-spacing: -0.5px;
  flex-shrink: 0;
}
.brand-text { display: flex; flex-direction: column; }
.brand-name { font-size: 15px; font-weight: 600; color: #fff; line-height: 1.2; }
.brand-sub { font-size: 11px; color: rgba(255,255,255,0.45); letter-spacing: 0.3px; }

/* Day tabs in header */
.day-tabs {
  display: flex;
  align-items: center;
  gap: 2px;
  padding: 0 20px;
  border-right: 1px solid rgba(255,255,255,0.1);
}
.day-tab {
  padding: 6px 14px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: rgba(255,255,255,0.5);
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.day-tab:hover { color: rgba(255,255,255,0.85); background: rgba(255,255,255,0.06); }
.day-tab.active { background: var(--purple); color: #fff; }

/* Track filter pills */
.track-filter {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 20px;
  overflow-x: auto;
  scrollbar-width: none;
  flex: 1;
}
.track-filter::-webkit-scrollbar { display: none; }
.track-pill {
  padding: 4px 11px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.15);
  background: transparent;
  color: rgba(255,255,255,0.5);
  font-size: 12px;
  font-family: var(--font);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
}
.track-pill:hover { color: #fff; border-color: rgba(255,255,255,0.35); }
.track-pill.active { color: #fff; }

/* ── TIME PANEL ── */
.time-panel {
  background: var(--fog);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
}
.time-panel-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 20px;
  flex-wrap: wrap;
}
.time-label { font-size: 12px; color: var(--ink3); font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; white-space: nowrap; }
.slider-wrap { flex: 1; min-width: 200px; position: relative; }
input[type=range] {
  width: 100%; -webkit-appearance: none; appearance: none;
  height: 3px; border-radius: 2px; outline: none; cursor: pointer;
  background: linear-gradient(to right, var(--purple) 0%, var(--purple) var(--pct,20%), rgba(91,82,200,0.2) var(--pct,20%));
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: var(--white);
  border: 2px solid var(--purple);
  box-shadow: 0 1px 6px rgba(91,82,200,0.25);
}
.ticks {
  display: flex;
  justify-content: space-between;
  margin-top: 5px;
}
.ticks span { font-size: 11px; color: var(--ink3); font-family: var(--mono); }
.time-now {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 500;
  color: var(--purple);
  background: var(--purple-dim);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  padding: 6px 14px;
  min-width: 80px;
  text-align: center;
  letter-spacing: -0.5px;
}
.stats-row {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}
.stat-item {
  display: flex;
  align-items: baseline;
  gap: 5px;
}
.stat-n { font-size: 20px; font-weight: 700; color: var(--ink); line-height: 1; }
.stat-l { font-size: 11px; color: var(--ink3); }

/* ── MAIN GRID ── */
.main { max-width: 1200px; margin: 0 auto; padding: 20px 24px 60px; }

.result-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.result-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--ink3);
}
.result-title strong { color: var(--ink); }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 12px;
}

/* ── CARD ── */
.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 16px 18px 18px;
  position: relative;
  overflow: hidden;
  transition: box-shadow 0.2s, transform 0.2s;
  animation: cardIn 0.2s ease both;
}
.card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  border-radius: 3px 0 0 3px;
}
.card:hover {
  box-shadow: 0 4px 20px rgba(91,82,200,0.1);
  transform: translateY(-1px);
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 10px;
}
.track-tag {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: 20px;
  letter-spacing: 0.2px;
  flex-shrink: 0;
}
.c-time {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink3);
  white-space: nowrap;
  padding-top: 3px;
}
.c-title {
  font-size: 14px;
  font-weight: 600;
  line-height: 1.5;
  color: var(--ink);
  margin-bottom: 7px;
}
.c-venue {
  display: flex;
  align-items: flex-start;
  gap: 5px;
  font-size: 12px;
  color: var(--ink3);
  margin-bottom: 10px;
  line-height: 1.4;
}
.pin { font-size: 13px; flex-shrink: 0; margin-top: 0px; }

.c-speakers {
  background: var(--fog);
  border-radius: 8px;
  padding: 9px 11px;
}
.c-sp-label { font-size: 10px; font-weight: 600; color: var(--ink3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 5px; }
.c-sp-text {
  font-size: 12px;
  color: var(--ink2);
  line-height: 1.65;
  max-height: 4.9em;
  overflow: hidden;
  position: relative;
}
.c-sp-text.expanded { max-height: none; }
.expand-btn {
  font-size: 11px;
  color: var(--purple);
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 0 0;
  font-family: var(--font);
  display: block;
}

/* ── EMPTY STATE ── */
.empty {
  grid-column: 1/-1;
  padding: 80px 20px;
  text-align: center;
}
.empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
.empty-title { font-size: 18px; font-weight: 600; color: var(--ink2); margin-bottom: 8px; }
.empty-sub { font-size: 14px; color: var(--ink3); }

/* ── COLORS PER TRACK ── */
.t-新生论坛::before { background: #5B52C8; }
.t-新生论坛 .track-tag { background: rgba(91,82,200,0.1); color: #5B52C8; }
.t-热带雨林::before { background: #1A7A4A; }
.t-热带雨林 .track-tag { background: rgba(26,122,74,0.1); color: #1A7A4A; }

.t-青年团聚 .track-tag { background: rgba(193,125,37,0.1); color: #C17D25; }

.t-探索空间 .track-tag { background: rgba(21,101,192,0.1); color: #1565C0; }

.t-思想约会 .track-tag { background: rgba(106,27,154,0.1); color: #6A1B9A; }
.t-青春舞台::before { background: #B83535; }
.t-青春舞台 .track-tag { background: rgba(184,53,53,0.1); color: #B83535; }
.t-热力运动::before { background: #2E7D32; }
.t-热力运动 .track-tag { background: rgba(46,125,50,0.1); color: #2E7D32; }
.t-星空露营::before { background: #0277BD; }
.t-星空露营 .track-tag { background: rgba(2,119,189,0.1); color: #0277BD; }
.t-百城味道::before { background: #C45A10; }
.t-百城味道 .track-tag { background: rgba(196,90,16,0.1); color: #C45A10; }
.t-团聚之夜::before { background: #4A148C; }
.t-团聚之夜 .track-tag { background: rgba(74,20,140,0.1); color: #4A148C; }

/* pill colors in header */
.pill-新生论坛.active { background: rgba(91,82,200,0.2); color: #a094f5; border-color: rgba(91,82,200,0.35); }
.pill-热带雨林.active { background: rgba(26,122,74,0.2); color: #6bcca0; border-color: rgba(26,122,74,0.35); }

.pill-青春舞台.active { background: rgba(184,53,53,0.2); color: #f08080; border-color: rgba(184,53,53,0.35); }
.pill-热力运动.active { background: rgba(46,125,50,0.2); color: #7dcf85; border-color: rgba(46,125,50,0.35); }
.pill-星空露营.active { background: rgba(2,119,189,0.2); color: #6ab4e8; border-color: rgba(2,119,189,0.35); }
.pill-百城味道.active { background: rgba(196,90,16,0.2); color: #f0a060; border-color: rgba(196,90,16,0.35); }
.pill-团聚之夜.active { background: rgba(74,20,140,0.2); color: #b090e8; border-color: rgba(74,20,140,0.35); }

@media (max-width: 640px) {
  .header-inner { flex-wrap: wrap; height: auto; padding: 12px 16px; gap: 10px; }
  .brand { border-right: none; padding-right: 0; }
  .day-tabs { border-right: none; padding: 0; }
  .track-filter { padding: 0; }
  .time-panel { padding: 12px 16px; }
  .main { padding: 14px 16px 40px; }
  .grid { grid-template-columns: 1fr; }
}
</style>

];


const TRACKS = ['新生论坛','热带雨林','青年团聚','探索空间','思想约会','青春舞台','热力运动','星空露营','百城味道','团聚之夜'];
const DAY_RANGES = {
  24: { min:28, max:84, ticks:['14:00','16:00','18:00','20:00','22:00','24:00'] },
  25: { min:8,  max:92, ticks:['9:00','11:00','13:00','15:00','17:00','19:00','21:00'] },
  26: { min:2,  max:68, ticks:['7:30','9:00','11:00','13:00','15:00','17:00'] },
};

let currentDay = 24;
let activeTrack = null;

function T(s){ const[h,m]=s.split(':').map(Number); return h*60+(m||0); }
function fmt(v){ const m=7*60+v*15; return `${Math.floor(m/60)}:${String(m%60).padStart(2,'0')}`; }
function mins(v){ return 7*60+v*15; }

// Build track filter pills
const tf = document.getElementById('trackFilter');
TRACKS.forEach(tr => {
  const b = document.createElement('button');
  b.className = `track-pill pill-${tr}`;
  b.textContent = tr;
  b.onclick = () => toggleTrack(tr);
  tf.appendChild(b);
});

function toggleTrack(tr){
  activeTrack = activeTrack === tr ? null : tr;
  document.querySelectorAll('.track-pill').forEach(p => {
    const t = p.textContent;
    p.classList.toggle('active', t === activeTrack);
  });
  render();
}

function setDay(d){
  currentDay = d;
  document.querySelectorAll('.day-tab').forEach((b,i)=>b.classList.toggle('active',[24,25,26][i]===d));
  const r = DAY_RANGES[d];
  const sl = document.getElementById('slider');
  sl.min = r.min; sl.max = r.max;
  sl.value = Math.round(r.min + (r.max-r.min)*0.15);
  onSlide();
}

function onSlide(){
  const v = +document.getElementById('slider').value;
  const t = fmt(v);
  const r = DAY_RANGES[currentDay];
  const pct = ((v-r.min)/(r.max-r.min)*100).toFixed(1);
  document.getElementById('slider').style.setProperty('--pct', pct+'%');
  document.getElementById('timeNow').textContent = t;
  document.getElementById('ticks').innerHTML = r.ticks.map(x=>`<span>${x}</span>`).join('');
  render(v);
}

function render(v){
  if(v===undefined) v = +document.getElementById('slider').value;
  const m = mins(v);
  let active = ALL_SESSIONS.filter(s => {
    if(s.d !== currentDay) return false;
    return T(s.s) <= m && T(s.e) > m;
  });
  if(activeTrack) active = active.filter(s => s.t === activeTrack);

  const tracks = new Set(active.map(s=>s.t));
  const speakers = active.reduce((a,s)=>{
    const lines = s.p.split('\n').filter(x=>x&&!x.includes('（续')).length;
    return a + Math.max(1, Math.min(lines, 8));
  }, 0);

  document.getElementById('sCount').textContent = active.length;
  document.getElementById('sTracks').textContent = tracks.size;
  document.getElementById('sSpeakers').textContent = speakers;
  document.getElementById('resultTitle').innerHTML = active.length
    ? `4月${currentDay}日 <strong>${fmt(v)}</strong> · 共 <strong>${active.length}</strong> 场同时进行${activeTrack ? `（已筛选：${activeTrack}）` : ''}`
    : `4月${currentDay}日 <strong>${fmt(v)}</strong>`;

  const order = ['新生论坛','热带雨林','青年团聚','探索空间','思想约会','青春舞台','热力运动','星空露营','百城味道','团聚之夜'];
  active.sort((a,b)=>order.indexOf(a.t)-order.indexOf(b.t));

  const grid = document.getElementById('grid');
  if(!active.length){
    grid.innerHTML = `<div class="empty"><div class="empty-icon">◎</div><div class="empty-title">该时段暂无活动</div><div class="empty-sub">请拖动时间轴查看其他时段</div></div>`;
    return;
  }

  grid.innerHTML = active.map((s,idx) => {
    const speakers = s.p.split('\n').filter(x=>x&&x!=='—');
    const hasMany = speakers.length > 4;
    const preview = speakers.slice(0, 4).join('\n');
    const spId = `sp-${idx}`;
    const spHTML = speakers.length ? `
      <div class="c-speakers">
        <div class="c-sp-label">召集人 / 主讲</div>
        <div class="c-sp-text" id="${spId}">${speakers.join('\n').replace(/\n/g,'<br>')}</div>
        ${hasMany ? `<button class="expand-btn" onclick="toggleExpand('${spId}',this)">展开全部 ${speakers.length} 人 ▾</button>` : ''}
      </div>` : '';
    return `<div class="card t-${s.t}" style="animation-delay:${idx*0.025}s">
      <div class="card-top">
        <span class="track-tag">${s.t}</span>
        <span class="c-time">${s.s} – ${s.e}</span>
      </div>
      <div class="c-title">${s.n}</div>
      <div class="c-venue"><span class="pin">◎</span><span>${s.v}</span></div>
      ${spHTML}
    </div>`;
  }).join('');
}

function toggleExpand(id, btn){
  const el = document.getElementById(id);
  el.classList.toggle('expanded');
  btn.textContent = el.classList.contains('expanded') ? '收起 ▴' : `展开全部 ▾`;
}

setDay(24);
</script>
</body>
</html>
